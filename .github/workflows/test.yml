name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -v
      - run: python -m compileall -q IconGrid.glyphsReporter tests scripts
      - run: python scripts/validate.py IconGrid.glyphsReporter --target both
      - run: python scripts/package.py
      - run: python scripts/release_check.py --require-artifacts
      - run: python scripts/build_site.py
      - uses: actions/upload-artifact@v4
        if: matrix.python == '3.11'
        with:
          name: GlyphsIconGrid-test-zip
          path: |
            dist/*.zip
            dist/*.sha256
